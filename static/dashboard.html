<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto-Nexus — Running Value Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --call: #34d399;
      --put: #f87171;
      --strike: #60a5fa;
      --amber: #fbbf24;
      --dim: #94a3b8;
      --main: #f8fafc;
      --glass-bg: rgba(15, 23, 42, 0.3);
      --glass-border: rgba(255, 255, 255, 0.07);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #020617; color: var(--main);
      min-height: 100vh; padding: 24px; overflow-x: hidden; position: relative;
      font-variant-numeric: tabular-nums;
    }
    .orb { position: fixed; border-radius: 50%; z-index: -1; filter: blur(130px); pointer-events: none; }
    .orb-1 { top: -10%; left: -5%; width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(139, 92, 246, 0.28) 0%, transparent 65%); animation: drift 20s ease-in-out infinite alternate; }
    .orb-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, transparent 65%); animation: drift 24s ease-in-out infinite alternate-reverse; }
    .orb-3 { top: 35%; left: 30%; width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, transparent 65%); animation: drift 28s ease-in-out infinite alternate; }
    @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-30px, 30px) scale(1.08); } }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border); border-top-color: rgba(255, 255, 255, 0.12);
      border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 14px; }
    .brand { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
    .brand span { font-size: 13px; font-weight: 500; color: var(--dim); margin-left: 8px; }

    .nav-strip { display: flex; gap: 12px; }
    .nav-btn {
      padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 13px;
      cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.08); text-decoration: none;
      transition: .25s; display: inline-flex; align-items: center; gap: 8px;
    }
    .nav-adm { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
    .nav-adm:hover { background: rgba(59, 130, 246, 0.2); }
    .nav-rec { background: rgba(16, 185, 129, 0.1); color: #34d399; }
    .nav-rec:hover { background: rgba(16, 185, 129, 0.25); }
    .nav-active { background: rgba(139, 92, 246, 0.2); color: #c084fc; border-color: rgba(167, 139, 250, 0.3); }

    .btn {
      padding: 9px 18px; border-radius: 10px; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 13px; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.06);
      transition: .25s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-teal { background: rgba(16, 185, 129, 0.1); color: #34d399; }
    .btn-teal:hover { background: rgba(16, 185, 129, 0.25); border-color: #34d399; }

    .dash-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 1024px) {
      .dash-layout { grid-template-columns: 1fr; }
    }

    .kpi-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .kpi-container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #c084fc, #6366f1);
    }
    .kpi-lbl { font-size: 12px; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
    .kpi-val { font-size: 48px; font-weight: 900; letter-spacing: -2px; transition: color 0.5s ease; }
    .kpi-pos { color: var(--call); text-shadow: 0 0 20px rgba(52, 211, 153, 0.2); }
    .kpi-neg { color: var(--put); text-shadow: 0 0 20px rgba(248, 113, 113, 0.2); }
    .kpi-neutral { color: var(--dim); }
    .kpi-meta { margin-top: 16px; font-size: 12px; color: var(--dim); }
    .kpi-meta b { color: #fff; font-family: 'JetBrains Mono', monospace; }

    .chart-container {
      padding: 24px;
      position: relative;
    }
    
    .tbl-section {
      padding: 24px;
    }
    .tbl-title { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .badge-live { background: rgba(52, 211, 153, 0.08); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.25); padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

    .tbl-wrap { overflow: auto; border-radius: 16px; max-height: 400px; border: 1px solid rgba(255, 255, 255, 0.05); }
    table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: center; }
    thead th {
      position: sticky; top: 0; z-index: 5; background: rgba(10, 15, 30, 0.5);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: var(--dim); font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.5px; padding: 14px 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      white-space: nowrap;
    }
    tbody td {
      padding: 12px 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      font-size: 12px; font-family: 'JetBrains Mono', monospace; white-space: nowrap;
      transition: .15s; color: #cbd5e1;
    }
    tbody tr:hover td { background: rgba(255, 255, 255, 0.02); color: #fff; }
    tbody tr:nth-child(even) td { background: rgba(255, 255, 255, 0.005); }

    .cpos { color: var(--call); font-weight: 700; }
    .cneg { color: var(--put); font-weight: 700; }
    .czro { color: var(--dim); }
    .csk { color: var(--strike); font-weight: 700; }
    .cidx { color: #60a5fa; }
    .cdt { color: #fb923c; font-size: 11px; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 20px; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="topbar">
    <div class="brand">📈 Running Value Dashboard <span>Crypto-Nexus-Engine by Traderbro</span></div>
    <div class="nav-strip">
      <a href="/" class="nav-btn nav-adm">⚙ Admin</a>
      <a href="/simple.html" class="nav-btn nav-rec">📊 Recorder</a>
      <a href="/dashboard.html" class="nav-btn nav-active">📈 Dashboard</a>
    </div>
  </div>

  <div class="dash-layout">
    <div class="glass kpi-container">
      <div class="kpi-lbl">Latest Running Value</div>
      <div id="kpi-val" class="kpi-val kpi-neutral">—</div>
      <div class="kpi-meta">
        <div>Total Rows: <b id="total-rows">0</b></div>
        <div style="margin-top: 6px;">Last Update: <b id="last-update">—</b></div>
      </div>
    </div>

    <div class="glass chart-container">
      <canvas id="runChart" style="width: 100%; height: 260px; max-height: 260px;"></canvas>
    </div>
  </div>

  <div class="glass tbl-section">
    <div class="tbl-title">
      <span>Historical Running Values</span>
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="btn btn-teal" onclick="downloadExcel()">⬇ Excel</button>
        <span class="badge-live">● LIVE UPDATES</span>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Index No.</th>
            <th>DateTime</th>
            <th>Expiry</th>
            <th>ATM Strike</th>
            <th>LTP (Index)</th>
            <th>Running Value</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr><td colspan="6" style="padding: 50px; color: var(--dim);">Fetching historical running values...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

<script>
let records = [];
let chart = null;
let startTime = Date.now();
let fetchCount = 0;
const intervalSec = 15;

const fmt = (v, d=2) => (v===null||v===undefined||v==="") ? "—" : isNaN(parseFloat(v)) ? "—" : parseFloat(v).toFixed(d);

function initChart() {
  const ctx = document.getElementById('runChart').getContext('2d');
  
  // Create gradient
  const gradient = ctx.createLinearGradient(0, 0, 0, 240);
  gradient.addColorStop(0, 'rgba(139, 92, 246, 0.25)');
  gradient.addColorStop(1, 'rgba(139, 92, 246, 0.0)');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Running Value',
        data: [],
        borderColor: '#a78bfa',
        borderWidth: 2.5,
        backgroundColor: gradient,
        fill: true,
        tension: 0.25,
        pointBackgroundColor: '#a78bfa',
        pointBorderColor: '#020617',
        pointBorderWidth: 1.5,
        pointRadius: 4,
        pointHoverRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15, 23, 42, 0.85)',
          titleFont: { family: 'Plus Jakarta Sans', weight: 'bold' },
          bodyFont: { family: 'JetBrains Mono' },
          borderColor: 'rgba(255, 255, 255, 0.1)',
          borderWidth: 1,
          cornerRadius: 8,
          padding: 10,
          displayColors: false
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255, 255, 255, 0.03)' },
          ticks: { color: '#64748b', font: { family: 'Plus Jakarta Sans', size: 9 } }
        },
        y: {
          grid: { color: 'rgba(255, 255, 255, 0.03)' },
          ticks: { color: '#64748b', font: { family: 'JetBrains Mono', size: 10 } }
        }
      }
    }
  });
}

function updateUI() {
  const kpiEl = document.getElementById("kpi-val");
  const totalRowsEl = document.getElementById("total-rows");
  const lastUpdateEl = document.getElementById("last-update");
  const tbody = document.getElementById("tbl-body");

  totalRowsEl.innerText = records.length;

  if (!records.length) {
    kpiEl.innerText = "—";
    kpiEl.className = "kpi-val kpi-neutral";
    tbody.innerHTML = `<tr><td colspan="6" style="padding: 50px; color: var(--dim);">No records found. Make sure simple.html is capturing option chain data.</td></tr>`;
    return;
  }

  // Get the latest completed running value
  // Note: the last element in the rows array is considered pending (incomplete diff_prev and running), 
  // so we take the second to last record if available, or the last one if only 1 exists.
  const displayRecord = records.length >= 2 ? records[records.length - 2] : records[records.length - 1];
  const rv = parseFloat(displayRecord.running || 0);

  // Update KPI Card
  kpiEl.innerText = (rv >= 0 ? "+" : "") + rv.toFixed(2);
  if (rv > 0) {
    kpiEl.className = "kpi-val kpi-pos";
  } else if (rv < 0) {
    kpiEl.className = "kpi-val kpi-neg";
  } else {
    kpiEl.className = "kpi-val kpi-neutral";
  }

  lastUpdateEl.innerText = displayRecord.datetime ? displayRecord.datetime.split(" ")[1] : "—";

  // Update Table
  tbody.innerHTML = "";
  // Render records in reverse order (latest first)
  [...records].reverse().forEach((r, idx) => {
    // Determine index number
    const realIdx = records.length - 1 - idx;
    const isPending = (realIdx === records.length - 1);

    const val = parseFloat(r.running || 0);
    const rcls = isPending ? "czro" : val > 0 ? "cpos" : val < 0 ? "cneg" : "czro";
    const runVal = isPending ? "Pending..." : (val >= 0 ? "+" : "") + val.toFixed(2);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>#${realIdx + 1}</td>
      <td class="cdt">${r.datetime || "—"}</td>
      <td style="color:#a78bfa;font-size:11px;">${r.expiry || "—"}</td>
      <td class="csk">${r.strike || "—"}</td>
      <td class="cidx">₹${fmt(r.index_ltp, 0)}</td>
      <td class="${rcls}">${runVal}</td>
    `;
    tbody.appendChild(tr);
  });

  // Update Chart
  if (chart) {
    // Only plot non-pending entries in the chart
    const plotRecords = records.slice(0, records.length - 1);
    const labels = plotRecords.map(r => r.datetime ? r.datetime.split(" ")[1] : "");
    const dataPoints = plotRecords.map(r => parseFloat(r.running || 0));

    chart.data.labels = labels;
    chart.data.datasets[0].data = dataPoints;

    // Adjust line color dynamically based on trend
    if (dataPoints.length > 0) {
      const lastPoint = dataPoints[dataPoints.length - 1];
      if (lastPoint > 0) {
        chart.data.datasets[0].borderColor = '#34d399';
        chart.data.datasets[0].pointBackgroundColor = '#34d399';
      } else if (lastPoint < 0) {
        chart.data.datasets[0].borderColor = '#f87171';
        chart.data.datasets[0].pointBackgroundColor = '#f87171';
      } else {
        chart.data.datasets[0].borderColor = '#a78bfa';
        chart.data.datasets[0].pointBackgroundColor = '#a78bfa';
      }
    }

    chart.update();
  }
}

async function fetchData() {
  try {
    const data = await (await fetch("/api/get-running?t=" + Date.now())).json();
    if (!data.rows) return;
    records = data.rows;
    updateUI();
  } catch (e) {
    console.error("Error fetching data:", e);
  }
}

async function preciseLoop() {
  fetchCount++;
  const nextTime = startTime + (fetchCount * intervalSec * 1000);
  const delay = nextTime - Date.now();
  setTimeout(async () => {
    await fetchData();
    preciseLoop();
  }, Math.max(0, delay));
}

function downloadExcel() {
  if (!records.length) { alert("No data."); return; }
  const now = new Date();
  
  // Force date and weekday to calculate using IST (Asia/Kolkata)
  const ds = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Kolkata' }).format(now);
  const dn = now.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata", weekday: "long" });
  
  const hdrs = ["DateTime", "Expiry", "ATM Strike", "LTP (Index)", "Running Value"];
  const fn = v => { if(v===null||v===undefined||v==="")return"";const n=parseFloat(v);return isNaN(n)?"":n; };
  
  const dataRows = records.map((r, i) => {
    const p = i === records.length - 1;
    return [
      r.datetime ?? "",
      r.expiry ?? "",
      r.strike ?? "",
      fn(r.index_ltp),
      p ? "" : fn(r.running)
    ];
  });

  const lastS = records.length >= 2 ? records[records.length - 2] : null;
  const fr = lastS ? Number(lastS.running || 0) : 0;
  const wsData = [
    [`Crypto-Nexus-Engine — Dashboard Running Values | ${ds} (${dn})`],
    ["Delta Exchange BTC Options | ₹INR | USD×94.33"],
    [],
    hdrs, ...dataRows, [],
    [`Final Running: ${fr >= 0 ? "+" : ""}${fr.toFixed(2)}`]
  ];
  
  const wb = XLSX.utils.book_new(), ws = XLSX.utils.aoa_to_sheet(wsData);
  ws["!cols"] = [{wch:22}, {wch:12}, {wch:12}, {wch:12}, {wch:15}];
  ws["!merges"] = [
    {s:{r:0,c:0},e:{r:0,c:4}},
    {s:{r:1,c:0},e:{r:1,c:4}},
    {s:{r:wsData.length-1,c:0},e:{r:wsData.length-1,c:4}}
  ];
  XLSX.utils.book_append_sheet(wb, ws, ds);
  XLSX.writeFile(wb, `CryptoNexus_Running_${ds}.xlsx`, {bookType:"xlsx",cellStyles:true});
}

window.addEventListener("load", async () => {
  initChart();
  await fetchData();
  preciseLoop();
});
</script>
</body>
</html>
